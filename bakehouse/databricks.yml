# This is a Databricks asset bundle definition for bakehouse.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: bakehouse
  uuid: 31888c46-aaff-4361-921b-4ef83ee10d1b

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-e5e03e34-5065.cloud.databricks.com
    variables:
      catalog: bakehouse
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-e5e03e34-5065.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/jhonpatstat@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/jhonpatstat@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bakehouse
      schema: prod
    permissions:
      - user_name: jhonpatstat@gmail.com
        level: CAN_MANAGE
